global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "emi-api"
    static_configs:
      # host.docker.internal resolves to the host machine from inside Docker (Section 11)
      # Replace with the FastAPI container service name in Docker Compose
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
